workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          curl -fsS "https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer" -o /tmp/AppleWWDRCAG3.cer && \
            security import /tmp/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" 2>/dev/null || true
          curl -fsS "https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer" -o /tmp/AppleWWDRCAG4.cer && \
            security import /tmp/AppleWWDRCAG4.cer -k "$KEYCHAIN_PATH" 2>/dev/null || true
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            || { echo "ERROR: p12 import failed"; exit 1; }
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          rm /tmp/cert.p12
          echo "Certificate import done"

      - name: Install provisioning profile
        script: |
          printf '%s' "$CM_PROVISIONING_PROFILE" | tr -d ' \n\r' | base64 --decode > /tmp/profile.mobileprovision
          echo "Decoded profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          security cms -D -i /tmp/profile.mobileprovision -o /tmp/profile_decoded.plist 2>&1 && echo "CMS decode: OK" || echo "CMS decode: FAILED"
          if [ -f /tmp/profile_decoded.plist ]; then
            echo "Profile UUID: $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile_decoded.plist 2>&1)"
            echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile_decoded.plist 2>&1)"
          fi
          KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain-db
          openssl pkcs7 -inform DER -in /tmp/profile.mobileprovision -out /tmp/profile_signing_certs.pem -print_certs 2>/dev/null && \
            echo "Extracted profile signing certs" || echo "Could not extract"
          if [ -f /tmp/profile_signing_certs.pem ]; then
            security import /tmp/profile_signing_certs.pem -k "$KEYCHAIN_PATH" -T /usr/bin/codesign 2>/dev/null || true
            awk '/-----BEGIN CERTIFICATE-----/{f="/tmp/profile_cert_" ++i ".pem"} f{print > f} /-----END CERTIFICATE-----/{f=""}' /tmp/profile_signing_certs.pem
            for cert in /tmp/profile_cert_*.pem; do
              security add-trusted-cert -d user -r trustRoot -k "$KEYCHAIN_PATH" "$cert" 2>/dev/null || true
            done
            echo "Profile signing cert chain imported and trusted"
          fi
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          PROFILE_UUID="5f7e57d5-8176-4446-b1a6-5e41b1d59c97"
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          cp /tmp/profile.mobileprovision \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Installed profile to both locations"

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Verify signing identity
        script: |
          echo "=== Signing identities ==="
          security find-identity -p codesigning -v
          echo "=== Profiles ==="
          find ~/Library -name "*.mobileprovision" 2>/dev/null
          echo "=== Unlock keychain ==="
          security unlock-keychain -p "" $HOME/Library/Keychains/build.keychain-db

      - name: Archive
        script: |
          security unlock-keychain -p "" $HOME/Library/Keychains/build.keychain-db
          security set-keychain-settings -lut 21600 $HOME/Library/Keychains/build.keychain-db
          echo "=== Identity check pre-archive ==="
          security find-identity -p codesigning -v $HOME/Library/Keychains/build.keychain-db
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive \
            DEVELOPMENT_TEAM=LYS695473H \
            CODE_SIGN_IDENTITY="Apple Distribution: Mackenzie Cutting (LYS695473H)" \
            PROVISIONING_PROFILE=5f7e57d5-8176-4446-b1a6-5e41b1d59c97 \
            PROVISIONING_PROFILE_SPECIFIER="SproutTogether App Store" \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain $HOME/Library/Keychains/build.keychain-db"

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /tmp/ipa-export \
            -exportOptionsPlist ios/ExportOptions.plist
          mkdir -p build/ios/ipa
          cp /tmp/ipa-export/*.ipa build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
