workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: 16
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          rm /tmp/cert.p12
          echo "=== Signing identities ==="
          security find-identity -p codesigning -v

      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          python3 -c "
          import sys
          data = open('/tmp/profile.mobileprovision','rb').read()
          idx = data.find(b'<?xml')
          if idx == -1: idx = data.find(b'bplist')
          if idx == -1: print('ERROR: no plist found'); sys.exit(1)
          end = data.rfind(b'</plist>') + len(b'</plist>')
          open('/tmp/profile.plist','wb').write(data[idx:end])
          print('Plist extracted OK')
          "
          echo "Profile UUID: $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)"
          echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)"
          echo "Expires: $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/profile.plist)"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          cp /tmp/profile.mobileprovision "$PROFILES_HOME/${PROFILE_UUID}.mobileprovision"
          echo "Installed to MobileDevice Provisioning Profiles"
          XCODE_PROFILES="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
          mkdir -p "$XCODE_PROFILES"
          cp /tmp/profile.mobileprovision "$XCODE_PROFILES/${PROFILE_UUID}.mobileprovision"
          echo "Installed to Xcode UserData Provisioning Profiles"
          ls "$PROFILES_HOME" && ls "$XCODE_PROFILES"

      - name: Flutter pub get
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Archive (unsigned)
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LYS695473H \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA
        script: |
          set -e
          /usr/libexec/PlistBuddy -c "Clear dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :method string app-store-connect" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :teamID string LYS695473H" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingStyle string manual" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles dict" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :provisioningProfiles:com.sprouttogether.app string 5f7e57d5-8176-4446-b1a6-5e41b1d59c97" /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy -c "Add :signingCertificate string Apple Distribution" /tmp/ExportOptions.plist
          cat /tmp/ExportOptions.plist
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath /tmp/export
          mkdir -p /Users/builder/clone/build/ios/ipa
          cp /tmp/export/*.ipa /Users/builder/clone/build/ios/ipa/
          echo "IPA exported:"
          ls -la /Users/builder/clone/build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
