workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          # Import Apple intermediate CA certificates to complete the cert chain
          curl -fsS "https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer" -o /tmp/AppleWWDRCAG3.cer && \
            security import /tmp/AppleWWDRCAG3.cer -k "$KEYCHAIN_PATH" 2>/dev/null || true
          curl -fsS "https://www.apple.com/certificateauthority/AppleWWDRCAG4.cer" -o /tmp/AppleWWDRCAG4.cer && \
            security import /tmp/AppleWWDRCAG4.cer -k "$KEYCHAIN_PATH" 2>/dev/null || true
          # Import the distribution certificate — fail fast if password is wrong
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            || { echo "ERROR: p12 import failed — check CM_CERTIFICATE_PASSWORD and CM_CERTIFICATE"; exit 1; }
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          # Add to search list WITHOUT replacing existing keychains
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          rm /tmp/cert.p12
          echo "Certificate import done"

      - name: Install provisioning profile
        script: |
          # Strip any whitespace/newlines from base64 before decoding
          printf '%s' "$CM_PROVISIONING_PROFILE" | tr -d ' \n\r' | base64 --decode > /tmp/profile.mobileprovision
          echo "Decoded profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          # Verify the profile is a valid CMS/PKCS7 file
          security cms -D -i /tmp/profile.mobileprovision -o /tmp/profile_decoded.plist 2>&1 && echo "CMS decode: OK" || echo "CMS decode: FAILED - profile may be corrupt"
          if [ -f /tmp/profile_decoded.plist ]; then
            echo "Profile UUID: $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile_decoded.plist 2>&1)"
            echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile_decoded.plist 2>&1)"
            echo "Expires: $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/profile_decoded.plist 2>&1)"
          fi
          # Install to both legacy and Xcode-managed locations
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          PROFILE_UUID="4af8c60c-f692-4ffc-90c1-384f0330f610"
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          cp /tmp/profile.mobileprovision \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Installed profile to both locations"

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Verify signing identity
        script: |
          echo "=== Signing identities in keychain ==="
          security find-identity -p codesigning -v
          echo "=== Installed provisioning profiles ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles in MobileDevice"
          ls -la ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/ 2>/dev/null || echo "No profiles in Xcode UserData"

      - name: Archive
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            archive \
            DEVELOPMENT_TEAM=LYS695473H \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE=4af8c60c-f692-4ffc-90c1-384f0330f610 \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /tmp/ipa-export \
            -exportOptionsPlist ios/ExportOptions.plist
          mkdir -p build/ios/ipa
          cp /tmp/ipa-export/*.ipa build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
