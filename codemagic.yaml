workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: 16
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          rm /tmp/cert.p12
          security find-identity -p codesigning -v

      - name: Install provisioning profile
        script: |
          set -e
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile file type:"
          file /tmp/profile.mobileprovision
          echo "First 20 bytes (hex):"
          xxd /tmp/profile.mobileprovision | head -2
          echo "Decoding with security cms..."
          security cms -D -i /tmp/profile.mobileprovision -o /tmp/profile.plist
          echo "Decode result: $?"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)
          echo "UUID: $PROFILE_UUID"
          echo "Name: $PROFILE_NAME"
          echo "Expires: $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/profile.plist)"
          cp /tmp/profile.mobileprovision "$PROFILES_HOME/${PROFILE_UUID}.mobileprovision"
          echo "Installed to: $PROFILES_HOME/${PROFILE_UUID}.mobileprovision"
          ls -la "$PROFILES_HOME/"

      - name: Flutter pub get
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Archive (unsigned)
        script: |
          set -e
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LYS695473H \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          echo "=== Archive contents ==="
          ls /tmp/Runner.xcarchive/Products/Applications/

      - name: Export IPA (App Store)
        script: |
          set -e
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          echo "Profile UUID: ${PROFILE_UUID}"
          echo "Profiles installed:"
          ls "$HOME/Library/MobileDevice/Provisioning Profiles/"
          python3 -c "import plistlib,sys;u=sys.argv[1];p={'method':'app-store-connect','teamID':'LYS695473H','signingStyle':'manual','signingCertificate':'Apple Distribution: Mackenzie Cutting (LYS695473H)','provisioningProfiles':{'com.sprouttogether.app':u},'uploadBitcode':False,'uploadSymbols':True};open('/tmp/ExportOptions.plist','wb').write(plistlib.dumps(p));print('ExportOptions created for: '+u)" "${PROFILE_UUID}"
          mkdir -p /Users/builder/clone/build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /Users/builder/clone/build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist
          IPA=$(find /Users/builder/clone/build/ios/ipa -name "*.ipa" | head -1)
          echo "IPA: ${IPA} ($(wc -c < "${IPA}") bytes)"

      - name: Upload to TestFlight
        script: |
          set -e
          IPA_PATH=$(find /Users/builder/clone/build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading: ${IPA_PATH} ($(wc -c < "${IPA_PATH}") bytes)"
          xcrun iTMSTransporter \
            -m upload \
            -f "${IPA_PATH}" \
            -u cutting.mackenzie4@gmail.com \
            -p $APP_SPECIFIC_PASSWORD

    artifacts:
      - build/ios/ipa/*.ipa
