workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
          source: true

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: 26
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          rm /tmp/cert.p12
          echo "=== All signing identities in ALL keychains ==="
          security find-identity -p codesigning -v
          echo "=== Custom keychain only ==="
          security find-identity -p codesigning -v ~/Library/Keychains/cms-keychain-db

      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          python3 -c "
          import sys
          data = open('/tmp/profile.mobileprovision','rb').read()
          idx = data.find(b'<?xml')
          if idx == -1: idx = data.find(b'bplist')
          if idx == -1: print('ERROR: no plist found'); sys.exit(1)
          end = data.rfind(b'</plist>') + len(b'</plist>')
          open('/tmp/profile.plist','wb').write(data[idx:end])
          print('Plist extracted OK')
          "
          echo "Profile UUID: $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)"
          echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          cp /tmp/profile.mobileprovision "$PROFILES_HOME/${PROFILE_UUID}.mobileprovision"
          echo "Installed as ${PROFILE_UUID}.mobileprovision"

      - name: Flutter pub get
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Archive (unsigned)
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LYS695473H \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Sign and package IPA
        script: |
          set -e
          CERT_SHA1="1826D8F4F54B2188AE873E7255C2A88728E4EDD4"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c "Print :UUID" /tmp/profile.plist)
          APP_ID=$(/usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /tmp/profile.plist)
          BUNDLE_ID="${APP_ID#*.}"
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          cp /tmp/profile.mobileprovision "$PROFILES_HOME/${PROFILE_UUID}.mobileprovision"
          CERT_NAME=$(security find-identity -p codesigning -v ~/Library/Keychains/cms-keychain-db 2>/dev/null | grep "$CERT_SHA1" | sed 's/.*"\(.*\)"/\1/' | head -1)
          [ -z "$CERT_NAME" ] && CERT_NAME="Apple Distribution"
          echo "Bundle: $BUNDLE_ID | Profile: $PROFILE_UUID | Cert: $CERT_NAME"
          rm -f /tmp/ExportOptions.plist
          /usr/libexec/PlistBuddy \
            -c "Add :method string app-store" \
            -c "Add :teamID string LYS695473H" \
            -c "Add :signingStyle string manual" \
            -c "Add :signingCertificate string $CERT_NAME" \
            -c "Add :provisioningProfiles dict" \
            -c "Add :provisioningProfiles:$BUNDLE_ID string $PROFILE_UUID" \
            -c "Add :stripSwiftSymbols bool true" \
            -c "Add :compileBitcode bool false" \
            /tmp/ExportOptions.plist
          echo "=== Export Options ==="; cat /tmp/ExportOptions.plist
          rm -rf /tmp/ExportDir && mkdir /tmp/ExportDir
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /tmp/ExportDir \
            -exportOptionsPlist /tmp/ExportOptions.plist
          mkdir -p /Users/builder/clone/build/ios/ipa
          find /tmp/ExportDir -name "*.ipa" | head -1 | xargs -I{} cp {} /Users/builder/clone/build/ios/ipa/Runner.ipa
          echo "IPA size: $(wc -c < /Users/builder/clone/build/ios/ipa/Runner.ipa) bytes"

      - name: Upload to TestFlight
        script: |
          xcrun altool --upload-app \
            -f /Users/builder/clone/build/ios/ipa/Runner.ipa \
            -t ios \
            --username "cutting.mackenzie4@gmail.com" \
            --password "$APP_SPECIFIC_PASSWORD" \
            --output-format xml

    artifacts:
      - build/ios/ipa/*.ipa
