workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: 16
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          rm /tmp/cert.p12
          echo "=== Signing identities ==="
          security find-identity -p codesigning -v

      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          python3 -c "
import sys
data = open('/tmp/profile.mobileprovision','rb').read()
idx = data.find(b'<?xml')
if idx == -1: idx = data.find(b'bplist')
if idx == -1: print('ERROR: no plist found'); sys.exit(1)
end = data.rfind(b'</plist>') + len(b'</plist>')
open('/tmp/profile.plist','wb').write(data[idx:end])
print('Plist extracted OK')
"
          echo "Profile UUID: $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)"
          echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)"
          echo "Expires: $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/profile.plist)"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          cp /tmp/profile.mobileprovision "$PROFILES_HOME/${PROFILE_UUID}.mobileprovision"
          echo "Installed as ${PROFILE_UUID}.mobileprovision"

      - name: Flutter pub get
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Archive (unsigned)
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LYS695473H \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Sign and package IPA
        script: |
          APP_PATH="/tmp/Runner.xcarchive/Products/Applications/Runner.app"
          /usr/libexec/PlistBuddy -c 'Print :Entitlements' /tmp/profile.plist -x > /tmp/entitlements.plist
          echo "Entitlements:"; cat /tmp/entitlements.plist
          cp /tmp/profile.mobileprovision "$APP_PATH/embedded.mobileprovision"
          echo "Profile embedded"
          find "$APP_PATH/Frameworks" \( -name "*.framework" -o -name "*.dylib" \) | while read item; do
            codesign --force --sign "Apple Distribution: Mackenzie Cutting (LYS695473H)" --timestamp "$item" 2>&1 || true
          done
          codesign --force --sign "Apple Distribution: Mackenzie Cutting (LYS695473H)" \
            --entitlements /tmp/entitlements.plist --timestamp "$APP_PATH"
          echo "=== Verify ===" && codesign --verify --deep --strict "$APP_PATH" && echo "OK" || echo "FAIL"
          cd /tmp && rm -rf Payload && mkdir Payload
          cp -r Runner.xcarchive/Products/Applications/Runner.app Payload/
          zip -qr Runner.ipa Payload/
          echo "IPA: $(wc -c < /tmp/Runner.ipa) bytes"
          mkdir -p /Users/builder/clone/build/ios/ipa
          cp /tmp/Runner.ipa /Users/builder/clone/build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
