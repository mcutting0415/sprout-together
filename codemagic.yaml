workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Install provisioning profile
        script: |
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null \
            | plutil -extract UUID xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Installed profile: $UUID"

      - name: Flutter pub get
        script: flutter pub get

      - name: Set up code signing in Xcode project
        script: |
          PROFILE_UUID=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/ | sed 's/\.mobileprovision//')
          echo "Using profile UUID: $PROFILE_UUID"
          # Patch the Xcode project Release config with correct signing settings
          cd ios
          /usr/libexec/PlistBuddy -c "Set :objects:97C147071CF9000F007C117D:buildSettings:CODE_SIGN_STYLE Manual" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :objects:97C147071CF9000F007C117D:buildSettings:CODE_SIGN_IDENTITY 'Apple Distribution'" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :objects:97C147071CF9000F007C117D:buildSettings:PROVISIONING_PROFILE $PROFILE_UUID" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          # Also patch Profile config (249021D4217E4FDB00AE95B9)
          /usr/libexec/PlistBuddy -c "Set :objects:249021D4217E4FDB00AE95B9:buildSettings:CODE_SIGN_STYLE Manual" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :objects:249021D4217E4FDB00AE95B9:buildSettings:CODE_SIGN_IDENTITY 'Apple Distribution'" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          /usr/libexec/PlistBuddy -c "Set :objects:249021D4217E4FDB00AE95B9:buildSettings:PROVISIONING_PROFILE $PROFILE_UUID" Runner.xcodeproj/project.pbxproj 2>/dev/null || true
          cd ..

      - name: Build IPA
        script: |
          # Write ExportOptions.plist
          PROFILE_UUID=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/ \
            | sed 's/\.mobileprovision//')
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>LYS695473H</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.sprouttogether.app</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

          flutter build ipa \
            --release \
            --export-options-plist=/tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
