workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: 16
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          rm /tmp/cert.p12
          echo "=== Signing identities ==="
          security find-identity -p codesigning -v

      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > "$PROFILES_HOME/sprouttogether_appstore.mobileprovision"
          echo "Installed profile ($(wc -c < "$PROFILES_HOME/sprouttogether_appstore.mobileprovision") bytes)"

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Set up code signing
        script: |
          xcode-project use-profiles
          echo "=== project.pbxproj signing settings after use-profiles ==="
          grep -E "CODE_SIGN|PROVISIONING_PROFILE|DEVELOPMENT_TEAM" ios/Runner.xcodeproj/project.pbxproj | sort -u

      - name: Archive
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /tmp/ipa-export \
            -exportOptionsPlist ios/ExportOptions.plist
          mkdir -p build/ios/ipa
          cp /tmp/ipa-export/*.ipa build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
