workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          KEYCHAIN_PATH=$HOME/Library/Keychains/build.keychain-db
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"
          security import /tmp/cert.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          # Add to search list WITHOUT replacing existing keychains (preserves Apple root certs)
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | xargs)
          rm /tmp/cert.p12

      - name: Install provisioning profile
        script: |
          printf '%s' "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          # Install to both legacy and Xcode-managed locations
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          PROFILE_UUID="4af8c60c-f692-4ffc-90c1-384f0330f610"
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          cp /tmp/profile.mobileprovision \
            ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision
          echo "Installed profile: $PROFILE_UUID (size: $(wc -c < /tmp/profile.mobileprovision) bytes)"

      - name: Flutter pub get
        script: flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Verify signing identity
        script: |
          security find-identity -p codesigning -v

      - name: Archive
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            archive \
            DEVELOPMENT_TEAM=LYS695473H \
            PROVISIONING_PROFILE=4af8c60c-f692-4ffc-90c1-384f0330f610 \
            CODE_SIGN_STYLE=Manual

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /tmp/ipa-export \
            -exportOptionsPlist ios/ExportOptions.plist
          mkdir -p build/ios/ipa
          cp /tmp/ipa-export/*.ipa build/ios/ipa/

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
