workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: 16
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          rm /tmp/cert.p12
          echo "=== Signing identities ==="
          security find-identity -p codesigning -v

      - name: Install provisioning profile
        script: |
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_HOME"
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > /tmp/profile.mobileprovision
          echo "Profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          python3 -c "data=open('/tmp/profile.mobileprovision','rb').read();idx=data.find(b'<?xml');idx=data.find(b'bplist') if idx<0 else idx;assert idx>=0,'no plist found';end=data.rfind(b'</plist>')+8;open('/tmp/profile.plist','wb').write(data[idx:end]);print('Plist extracted OK')"
          echo "Profile UUID: $(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)"
          echo "Profile Name: $(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)"
          echo "Expires: $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/profile.plist)"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          cp /tmp/profile.mobileprovision "$PROFILES_HOME/${PROFILE_UUID}.mobileprovision"
          echo "Installed as ${PROFILE_UUID}.mobileprovision"

      - name: Flutter pub get
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Archive (unsigned)
        script: |
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LYS695473H \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Export IPA (App Store)
        script: |
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          python3 -c "import plistlib; p={'method':'app-store','signingStyle':'manual','signingCertificate':'Apple Distribution: Mackenzie Cutting (LYS695473H)','provisioningProfiles':{'com.sprouttogether.app':'${PROFILE_UUID}'},'uploadBitcode':False,'uploadSymbols':True}; open('/tmp/ExportOptions.plist','wb').write(plistlib.dumps(p)); print('ExportOptions.plist created')"
          mkdir -p /Users/builder/clone/build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /Users/builder/clone/build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist
          echo "=== IPA files ==="
          ls -la /Users/builder/clone/build/ios/ipa/

      - name: Upload to TestFlight
        script: |
          IPA_PATH=$(find /Users/builder/clone/build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading: $IPA_PATH"
          xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --username cutting.mackenzie4@gmail.com \
            --password $APP_SPECIFIC_PASSWORD \
            --verbose

    artifacts:
      - build/ios/ipa/*.ipa
