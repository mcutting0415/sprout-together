workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: 16
      cocoapods: default

    scripts:
      - name: Set up keychain
        script: keychain initialize

      - name: Add certificate to keychain
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          keychain add-certificates --certificate /tmp/cert.p12 --certificate-password $CM_CERTIFICATE_PASSWORD
          rm /tmp/cert.p12
          security find-identity -p codesigning -v

      - name: Install provisioning profile
        script: |
          set -e
          # Download WWDR CA certs to ensure chain verification works for DVTProvisioningProfileManager
          curl -sf https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer -o /tmp/WWDRG3.cer && \
            security import /tmp/WWDRG3.cer -k ~/Library/Keychains/login.keychain-db 2>/dev/null || echo "WWDRG3 import skipped"
          curl -sf https://www.apple.com/certificateauthority/AppleWWDRCAG6.cer -o /tmp/WWDRG6.cer && \
            security import /tmp/WWDRG6.cer -k ~/Library/Keychains/login.keychain-db 2>/dev/null || echo "WWDRG6 import skipped"
          # Use Codemagic's own profile installer
          xcode-project use-profiles
          # Find the installed profile and extract plist for later steps
          PROFILES_HOME="$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "Profiles installed:"
          ls -la "$PROFILES_HOME/"
          LATEST_PROFILE=$(ls -t "$PROFILES_HOME/"*.mobileprovision | head -1)
          echo "Using profile: $LATEST_PROFILE"
          security cms -D -i "$LATEST_PROFILE" -o /tmp/profile.plist
          echo "Decode result: $?"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist)
          echo "UUID: $PROFILE_UUID"
          echo "Name: $PROFILE_NAME"
          echo "Expires: $(/usr/libexec/PlistBuddy -c 'Print :ExpirationDate' /tmp/profile.plist)"
          # Save a raw copy of the mobileprovision for manual codesign fallback
          cp "$LATEST_PROFILE" /tmp/profile.mobileprovision
          # Verify the PKCS7 structure with openssl
          echo "=== OpenSSL PKCS7 cert chain ==="
          openssl pkcs7 -inform DER -in /tmp/profile.mobileprovision -print_certs -noout 2>&1 | head -20 || echo "openssl check skipped"
          echo "Keychain search list:"
          security list-keychains

      - name: Flutter pub get
        script: |
          flutter config --no-enable-swift-package-manager
          flutter pub get

      - name: Pod install
        script: cd ios && pod install

      - name: Archive (unsigned)
        script: |
          set -e
          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            -archivePath /tmp/Runner.xcarchive \
            -derivedDataPath /tmp/DerivedData \
            archive \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=LYS695473H \
            AD_HOC_CODE_SIGNING_ALLOWED=YES
          echo "=== Archive contents ==="
          ls /tmp/Runner.xcarchive/Products/Applications/

      - name: Export IPA (App Store)
        script: |
          set -e
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist)
          CERT_IDENTITY="Apple Distribution: Mackenzie Cutting (LYS695473H)"
          echo "Profile UUID: ${PROFILE_UUID}"
          echo "Profiles installed:"
          ls "$HOME/Library/MobileDevice/Provisioning Profiles/"
          echo "Codesign identities:"
          security find-identity -p codesigning -v
          echo "Keychain search list:"
          security list-keychains
          python3 -c "import plistlib,sys;u=sys.argv[1];p={'method':'app-store-connect','teamID':'LYS695473H','signingStyle':'manual','signingCertificate':'Apple Distribution: Mackenzie Cutting (LYS695473H)','provisioningProfiles':{'com.sprouttogether.app':u},'uploadBitcode':False,'uploadSymbols':True};open('/tmp/ExportOptions.plist','wb').write(plistlib.dumps(p));print('ExportOptions created for: '+u)" "${PROFILE_UUID}"
          mkdir -p /Users/builder/clone/build/ios/ipa
          echo "=== Trying xcodebuild -exportArchive ==="
          EXPORT_OK=0
          xcodebuild -exportArchive \
            -archivePath /tmp/Runner.xcarchive \
            -exportPath /Users/builder/clone/build/ios/ipa \
            -exportOptionsPlist /tmp/ExportOptions.plist 2>&1 && EXPORT_OK=1 || true
          if [ "$EXPORT_OK" = "0" ]; then
            echo "=== xcodebuild export failed — using manual codesign ==="
            APP_PATH=$(find /tmp/Runner.xcarchive -name "Runner.app" | head -1)
            echo "App path: $APP_PATH"
            # Embed provisioning profile
            cp /tmp/profile.mobileprovision "$APP_PATH/embedded.mobileprovision"
            # Extract entitlements from profile
            /usr/libexec/PlistBuddy -c 'Print :Entitlements' /tmp/profile.plist -x > /tmp/entitlements.plist
            echo "=== Entitlements ==="
            cat /tmp/entitlements.plist
            # Sign frameworks and dylibs from deepest first
            find "$APP_PATH/Frameworks" -type d -name "*.framework" 2>/dev/null | while read fw; do
              echo "Signing framework: $fw"
              codesign --force --sign "$CERT_IDENTITY" --timestamp "$fw"
            done
            find "$APP_PATH" -name "*.dylib" 2>/dev/null | while read dylib; do
              echo "Signing dylib: $dylib"
              codesign --force --sign "$CERT_IDENTITY" --timestamp "$dylib"
            done
            find "$APP_PATH/PlugIns" -type d -name "*.appex" 2>/dev/null | while read ext; do
              echo "Signing extension: $ext"
              codesign --force --sign "$CERT_IDENTITY" --entitlements /tmp/entitlements.plist --timestamp "$ext"
            done
            # Sign main app
            codesign --force --sign "$CERT_IDENTITY" --entitlements /tmp/entitlements.plist --timestamp "$APP_PATH"
            echo "=== Codesign verification ==="
            codesign --verify --verbose=4 "$APP_PATH"
            # Package into IPA
            mkdir -p /tmp/IPAPayload
            cp -r "$APP_PATH" /tmp/IPAPayload/Runner.app
            cd /tmp && zip -qr /Users/builder/clone/build/ios/ipa/Runner.ipa IPAPayload/
            echo "IPA created: $(ls -lh /Users/builder/clone/build/ios/ipa/Runner.ipa)"
          fi
          IPA=$(find /Users/builder/clone/build/ios/ipa -name "*.ipa" | head -1)
          echo "IPA: ${IPA} ($(wc -c < "${IPA}") bytes)"

      - name: Upload to TestFlight
        script: |
          set -e
          IPA_PATH=$(find /Users/builder/clone/build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading: ${IPA_PATH} ($(wc -c < "${IPA_PATH}") bytes)"
          xcrun iTMSTransporter \
            -m upload \
            -f "${IPA_PATH}" \
            -u cutting.mackenzie4@gmail.com \
            -p $APP_SPECIFIC_PASSWORD

    artifacts:
      - build/ios/ipa/*.ipa
