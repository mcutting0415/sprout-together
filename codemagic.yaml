workflows:
  ios-testflight:
    name: iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
      flutter: stable
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install certificate
        script: |
          echo $CM_CERTIFICATE | base64 --decode > /tmp/cert.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-keychain-settings -lut 7200 build.keychain
          security import /tmp/cert.p12 \
            -k build.keychain \
            -P "$CM_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain
          rm /tmp/cert.p12

      - name: Install provisioning profile
        script: |
          echo $CM_PROVISIONING_PROFILE | base64 --decode > /tmp/profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i /tmp/profile.mobileprovision 2>/dev/null \
            | plutil -extract UUID xml1 -o - - \
            | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp /tmp/profile.mobileprovision \
            ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "Installed profile: $UUID"

      - name: Flutter pub get
        script: flutter pub get

      - name: Set up code signing in Xcode project
        script: |
          PROFILE_UUID=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/ | sed 's/\.mobileprovision//')
          echo "Using profile UUID: $PROFILE_UUID"
          PBXPROJ="ios/Runner.xcodeproj/project.pbxproj"
          # Add signing settings to Release build config (97C147071CF9000F007C117D)
          # Use sed to insert after VERSIONING_SYSTEM in Release target config
          sed -i '' \
            "s/VERSIONING_SYSTEM = \"apple-generic\";\n\t\t\t};\n\t\t\tname = Release;/VERSIONING_SYSTEM = \"apple-generic\";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tCODE_SIGN_IDENTITY = \"Apple Distribution\";\n\t\t\t\tPROVISIONING_PROFILE = \"${PROFILE_UUID}\";\n\t\t\t};\n\t\t\tname = Release;/g" \
            "$PBXPROJ" 2>/dev/null || true
          # Simpler approach: use Python to patch the file
          python3 - <<PYEOF
import re, os
uuid = "$PROFILE_UUID"
path = "ios/Runner.xcodeproj/project.pbxproj"
with open(path, 'r') as f:
    content = f.read()
# Find the Release target build config block and add signing settings
# Target the 97C147071CF9000F007C117D Release block
old = 'PRODUCT_BUNDLE_IDENTIFIER = com.sprouttogether.app;\n\t\t\t\tDEVELOPMENT_TEAM = LYS695473H;\n\t\t\t\tPRODUCT_NAME = "\$(TARGET_NAME)";\n\t\t\t\tSWIFT_OBJC_BRIDGING_HEADER = "Runner/Runner-Bridging-Header.h";\n\t\t\t\tSWIFT_VERSION = 5.0;\n\t\t\t\tVERSIONING_SYSTEM = "apple-generic";\n\t\t\t};\n\t\t\tname = Release;'
new = f'PRODUCT_BUNDLE_IDENTIFIER = com.sprouttogether.app;\n\t\t\t\tCODE_SIGN_IDENTITY = "Apple Distribution";\n\t\t\t\tCODE_SIGN_STYLE = Manual;\n\t\t\t\tDEVELOPMENT_TEAM = LYS695473H;\n\t\t\t\tPROVISIONING_PROFILE = "{uuid}";\n\t\t\t\tPROVISIONING_PROFILE_SPECIFIER = "";\n\t\t\t\tPRODUCT_NAME = "$(TARGET_NAME)";\n\t\t\t\tSWIFT_OBJC_BRIDGING_HEADER = "Runner/Runner-Bridging-Header.h";\n\t\t\t\tSWIFT_VERSION = 5.0;\n\t\t\t\tVERSIONING_SYSTEM = "apple-generic";\n\t\t\t}};\n\t\t\tname = Release;'
if old in content:
    content = content.replace(old, new)
    print("Patched Release config successfully")
else:
    print("WARNING: Could not find Release config block to patch")
    print(repr(content[content.find('97C147071CF9000F007C117D'):content.find('97C147071CF9000F007C117D')+500]))
with open(path, 'w') as f:
    f.write(content)
PYEOF

      - name: Build IPA
        script: |
          # Write ExportOptions.plist
          PROFILE_UUID=$(ls ~/Library/MobileDevice/Provisioning\ Profiles/ \
            | sed 's/\.mobileprovision//')
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>LYS695473H</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.sprouttogether.app</key>
              <string>${PROFILE_UUID}</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
          </dict>
          </plist>
          EOF

          flutter build ipa \
            --release \
            --export-options-plist=/tmp/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        apple_id: cutting.mackenzie4@gmail.com
        password: $APP_SPECIFIC_PASSWORD
